name: pet-platform

include:
  - path: ./backend/docker-compose.yml

services:
  frontend:
    build:
      context: ./frontend/pet-platform-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
      GATE_FIXTURE_MODE: "0"
      NEXT_PUBLIC_GATE_FIXTURE_MODE: "0"
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
